data:
  base_path: "data/processed/darus"
  history: 30
  horizon: 30
  batch_size: 256

model:
  type: "tcn"
  hidden_dim: 128        
  num_layers: 4          
  dropout: 0.1

training:
  epochs: 20
  lr: 0.001
  device: "cuda"

logging:
  save_dir: "experiments/results"
  run_name: "p1_tcn_baseline"
