data:
  base_path: "data/processed/darus"
  history: 30
  horizon: 30
  batch_size: 64
  num_workers: 0

model:
  type: "gru_seq2seq"      # <--- NEW
  hidden_dim: 128
  num_layers: 2
  dropout: 0.1

training:
  epochs: 20
  lr: 0.001
  weight_decay: 0.0
  device: "cpu"  # or "cuda" in Colab

logging:
  save_dir: "experiments/results"
  run_name: "p1_gru_seq2seq_baseline"
