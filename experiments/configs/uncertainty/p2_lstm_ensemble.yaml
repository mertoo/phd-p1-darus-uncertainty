data:
  base_path: "data/processed/darus"
  history: 30
  horizon: 30
  batch_size: 256

model:
  type: "lstm"
  hidden_dim: 128
  num_layers: 2
  dropout: 0.0

ensemble:
  n_models: 5

training:
  epochs: 20
  lr: 0.001
  device: "cpu"

logging:
  save_dir: "experiments/results/uncertainty"
  run_name: "p2_lstm_deep_ensemble"
